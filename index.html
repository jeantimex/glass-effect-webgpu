<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glass Effect WebGPU</title>
    <script type="module" crossorigin src="/glass-effect-webgpu/assets/index-CkkCfryU.js"></script>
    <link rel="stylesheet" crossorigin href="/glass-effect-webgpu/assets/index-Crx95Q-y.css">
  </head>
  <body>
    <div id="app">
      <div class="preview">
        <canvas id="mainCanvas"></canvas>
        <div id="loadingOverlay" class="loading-overlay" role="status" aria-live="polite" aria-label="Loading scene">
          <div class="loading-spinner" aria-hidden="true"></div>
        </div>
        <a class="github-link" href="https://github.com/jeantimex/glass-effect-webgpu" target="_blank" rel="noreferrer" aria-label="Open the Glass Effect WebGPU project on GitHub" style="visibility: hidden; opacity: 0;">
          <svg viewBox="0 0 24 24" aria-hidden="true">

          </svg>
          <span>jeantimex</span>
        </a>
        <button id="panelToggleButton" class="panel-toggle-button" type="button" aria-label="Open controls" aria-expanded="false" aria-controls="controlPanel">
          <svg class="panel-toggle-icon panel-toggle-open-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round"/>
          </svg>
          <svg class="panel-toggle-icon panel-toggle-close-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div id="panelBackdrop" class="panel-backdrop" aria-hidden="true"></div>

      <div id="controlPanel" class="panel">
        <div class="panel-section controls-section">
          <button class="section-header" type="button" aria-expanded="true">
            <span>CONTROLS</span>
            <span class="section-toggle" aria-hidden="true"></span>
          </button>
          <div class="section-content controls-content">
            <div class="control-group">
              <div class="control-group-title">Shape</div>
              <div class="control-row">
                <label>Shape</label>
                <select id="basicShapeType">
                  <option value="circle">Circle</option>
                  <option value="rectangle">Rectangle</option>
                </select>
              </div>
              <div class="control-row circle-preset-only">
                <label>Items</label>
                <div class="button-group">
                  <button id="circlePresetAdd" type="button">Add</button>
                  <button id="circlePresetRemove" type="button">Remove</button>
                </div>
              </div>
              <div class="control-row circle-preset-only">
                <label>Strategy</label>
                <select id="circlePresetStrategy">
                  <option value="stack">Stack</option>
                  <option value="merge">Same Layer</option>
                </select>
              </div>
              <div class="control-row circle-only-control has-instance-control">
                <label>Circle Size</label>
                <input type="range" id="circleSize" min="0.3" max="1.3" step="0.01" value="0.8">
              </div>
              <div class="control-row basic-shape-rect-control has-instance-control hidden">
                <label>Width</label>
                <input type="range" id="basicShapeRectWidth" min="48" max="760" step="4" value="200">
              </div>
              <div class="control-row basic-shape-rect-control has-instance-control hidden">
                <label>Height</label>
                <input type="range" id="basicShapeRectHeight" min="48" max="760" step="4" value="100">
              </div>
              <div class="control-row basic-shape-rect-control has-instance-control hidden">
                <label>Border Radius</label>
                <input type="range" id="basicShapeRectRadius" min="0" max="100" step="1" value="100">
              </div>
              <div class="control-row circle-only-control has-instance-control">
                <label>Icon</label>
                <select id="iconType">
                  <option value="none">None</option>
                  <option value="albums">Albums</option>
                  <option value="battery">Battery</option>
                  <option value="bluetooth">Bluetooth</option>
                  <option value="calendar">Calendar</option>
                  <option value="camera">Camera</option>
                  <option value="chat">Chat</option>
                  <option value="cloud">Cloud</option>
                  <option value="disc">Disc</option>
                  <option value="document">Document</option>
                  <option value="dots">Dots</option>
                  <option value="fast-forward">Fast Forward</option>
                  <option value="film">Film</option>
                  <option value="folder">Folder</option>
                  <option value="headset">Headset</option>
                  <option value="heart">Heart</option>
                  <option value="home">Home</option>
                  <option value="image">Image</option>
                  <option value="location">Location</option>
                  <option value="lock">Lock</option>
                  <option value="mail">Mail</option>
                  <option value="map">Map</option>
                  <option value="messages">Messages</option>
                  <option value="mic">Mic</option>
                  <option value="moon">Moon</option>
                  <option value="music">Music</option>
                  <option value="notes">Notes</option>
                  <option value="notification">Notification</option>
                  <option value="pause">Pause</option>
                  <option value="person">Person</option>
                  <option value="phone">Phone</option>
                  <option value="play">Play</option>
                  <option value="radio">Radio</option>
                  <option value="repeat">Repeat</option>
                  <option value="rewind">Rewind</option>
                  <option value="search">Search</option>
                  <option value="settings">Settings</option>
                  <option value="shuffle">Shuffle</option>
                  <option value="skip-back">Skip Back</option>
                  <option value="skip-forward">Skip Forward</option>
                  <option value="star">Star</option>
                  <option value="stop">Stop</option>
                  <option value="sun">Sun</option>
                  <option value="tv">TV</option>
                  <option value="video">Video</option>
                  <option value="volume-high">Volume High</option>
                  <option value="volume-low">Volume Low</option>
                  <option value="volume-mute">Volume Mute</option>
                  <option value="volume-off">Volume Off</option>
                  <option value="wifi">Wifi</option>
                </select>
              </div>
              <div class="control-row circle-only-control icon-only-control has-instance-control hidden">
                <label>Icon Opacity</label>
                <input type="range" id="iconOpacity" min="0" max="1" step="0.01" value="0.8">
              </div>
              <div class="control-row circle-only-control icon-only-control has-instance-control hidden">
                <label>Icon Scale</label>
                <input type="range" id="iconScale" min="0.1" max="0.8" step="0.01" value="0.45">
              </div>
              <div class="control-row circle-only-control icon-only-control has-instance-control hidden">
                <label>Icon Color</label>
                <input type="color" id="iconColor" value="#ffffff">
              </div>
            </div>

            <div class="control-group has-instance-control">
              <div class="control-group-title">Surface</div>
              <div class="surface-buttons-row">
                <button class="surface-btn active" data-surface="convex-circle" title="Convex Circle">
                  <svg viewBox="0 0 40 40"><path d="M5 35 Q5 5 35 5" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                </button>
                <button class="surface-btn" data-surface="convex-squircle" title="Convex Squircle">
                  <svg viewBox="0 0 40 40"><path d="M5 35 Q5 20 20 10 Q30 5 35 5" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                </button>
                <button class="surface-btn" data-surface="concave" title="Concave">
                  <svg viewBox="0 0 40 40"><path d="M5 5 Q5 35 35 35" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                </button>
                <button class="surface-btn" data-surface="lip" title="Lip">
                  <svg viewBox="0 0 40 40"><path d="M5 25 Q10 5 20 15 Q30 25 35 20" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                </button>
              </div>
            </div>

            <div class="control-group has-instance-control displacement-group collapsed">
              <button class="control-group-header" type="button" aria-expanded="false">
                <span class="control-group-title">Displacement Map</span>
                <span class="section-toggle" aria-hidden="true"></span>
              </button>
              <div class="displacement-content">
                <canvas id="displacementMap"></canvas>
              </div>
            </div>

            <div class="control-group has-instance-control">
              <div class="control-group-title">Geometry</div>
              <div class="control-row">
                <label>Bezel Width</label>
                <input type="range" id="bezelWidth" min="0" max="100" value="45">
              </div>
              <div class="control-row">
                <label>Glass Thickness</label>
                <input type="range" id="glassThickness" min="0" max="100" value="10">
              </div>
              <div class="control-row">
                <label>Refractive Index</label>
                <input type="range" id="refractiveIndex" min="1" max="2.5" step="0.05" value="1.5">
              </div>
              <div class="control-row">
                <label>Refraction Level</label>
                <input type="range" id="scaleRatio" min="0" max="2" step="0.01" value="1">
              </div>
              <div class="control-row">
                <label>Magnifying Scale</label>
                <input type="range" id="magnifyingScale" min="-200" max="200" step="5" value="0">
              </div>
            </div>

            <div class="control-group">
              <div class="control-group-title">Background</div>
              <div class="control-row">
                <label>Background</label>
                <select id="backgroundType">
                  <option value="banner">Liquid Glass</option>
                  <option value="article">HTML-in-Canvas</option>
                  <option value="grid">CSS Animation</option>
                </select>
              </div>
              <div class="control-row grid-only-control">
                <label>Grid Cell Size</label>
                <input type="range" id="gridCellSize" min="20" max="150" step="5" value="105">
              </div>
              <div class="control-row grid-only-control">
                <label>Grid Speed</label>
                <input type="range" id="gridSpeed" min="0" max="100" step="1" value="40">
              </div>
              <div class="control-row">
                <label>Background Brightness</label>
                <input type="range" id="bgBrightness" min="0" max="2" step="0.1" value="1">
              </div>
            </div>

            <div class="control-group has-instance-control">
              <div class="control-group-title">Optics</div>
              <div class="control-row">
                <label>Blur Type</label>
                <select id="blurType">
                  <option value="0">Gaussian</option>
                  <option value="1">Frosted Scatter</option>
                </select>
              </div>
              <div class="control-row">
                <label>Blur</label>
                <input type="range" id="blurAmount" min="0" max="100" step="1" value="0">
              </div>
              <div class="control-row">
                <label>Progressive Blur</label>
                <input type="range" id="progressiveBlur" min="0" max="1" step="0.05" value="0">
              </div>
              <div class="control-row">
                <label>Progressive Blur Mode</label>
                <select id="progressiveBlurType">
                  <option value="0">Edge Falloff</option>
                  <option value="1">Overlay Bands</option>
                </select>
              </div>
              <div class="control-row">
                <label>Chromatic Aberration</label>
                <input type="checkbox" id="chromaticAberration" checked>
              </div>
              <div class="control-row chromatic-only-control hidden">
                <label>Chromatic Strength</label>
                <input type="range" id="chromaticStrength" min="0.1" max="5" step="0.1" value="0.2">
              </div>
              <div class="control-row chromatic-only-control hidden">
                <label>Chromatic Base</label>
                <input type="range" id="chromaticBase" min="0.1" max="1" step="0.05" value="0.4">
              </div>
              <div class="control-row">
                <label>Glass Theme</label>
                <select id="glassTheme">
                  <option value="system">System</option>
                  <option value="light">Light</option>
                  <option value="dark">Dark</option>
                  <option value="custom">Custom</option>
                </select>
              </div>
              <div class="control-row">
                <label>Glass Color</label>
                <input type="color" id="glassBgColor" value="#ffffff">
              </div>
              <div class="control-row">
                <label>Glass Background Opacity</label>
                <input type="range" id="glassBgOpacity" min="0" max="1" step="0.01" value="0">
              </div>
              <div class="control-row">
                <label>Pressed Glass Opacity</label>
                <input type="range" id="pressedGlassBgOpacity" min="0" max="1" step="0.01" value="0">
              </div>
            </div>

            <div class="control-group has-instance-control">
              <div class="control-group-title">Liquid Interaction</div>
              <div class="control-row">
                <label>Enabled</label>
                <input type="checkbox" id="liquidEnabled" checked>
              </div>
              <div class="control-row">
                <label>Press Scale</label>
                <input type="range" id="liquidPressScale" min="1" max="1.4" step="0.01" value="1.16">
              </div>
              <div class="control-row">
                <label>Press Refraction</label>
                <input type="range" id="liquidPressRefraction" min="1" max="2.5" step="0.01" value="1.28">
              </div>
              <div class="control-row">
                <label>Speed</label>
                <input type="range" id="liquidSpeed" min="0.25" max="2" step="0.05" value="1">
              </div>
              <div class="control-row">
                <label>Click Squash</label>
                <input type="range" id="liquidClickSquash" min="0" max="1.5" step="0.05" value="1">
              </div>
              <div class="control-row">
                <label>Drag Squash</label>
                <input type="range" id="liquidDragSquash" min="0" max="2" step="0.05" value="1">
              </div>
              <div class="control-row">
                <label>Release Squash</label>
                <input type="range" id="liquidReleaseSquash" min="0" max="1.5" step="0.05" value="1">
              </div>
            </div>

            <div class="control-group has-instance-control">
              <div class="control-group-title">Specular Highlight</div>
              <div class="control-row">
                <label>Specular Type</label>
                <select id="specularType">
                  <option value="0">Rim Lighting</option>
                  <option value="1">Layered Specular</option>
                </select>
              </div>
              <div class="control-row">
                <label>Specular Opacity</label>
                <input type="range" id="specularOpacity" min="0" max="1" step="0.05" value="1">
              </div>
              <div class="control-row">
                <label>Specular Angle</label>
                <input type="range" id="specularAngle" min="-180" max="180" step="5" value="60">
              </div>
              <div class="control-row">
                <label>Specular Saturation</label>
                <input type="range" id="specularSaturation" min="0" max="10" step="0.5" value="4">
              </div>
            </div>

            <div class="control-group has-instance-control">
              <div class="control-group-title">Shadow</div>
              <div class="control-row">
                <label>Shadow Opacity</label>
                <input type="range" id="shadowOpacity" min="0" max="1" step="0.05" value="0.1">
              </div>
              <div class="control-row">
                <label>Shadow Blur</label>
                <input type="range" id="shadowBlur" min="0" max="100" step="1" value="30">
              </div>
              <div class="control-row">
                <label>Shadow Offset X</label>
                <input type="range" id="shadowOffsetX" min="-50" max="50" step="1" value="0">
              </div>
              <div class="control-row">
                <label>Shadow Offset Y</label>
                <input type="range" id="shadowOffsetY" min="-50" max="50" step="1" value="15">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
